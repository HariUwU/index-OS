<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- WILL OF THE CITY :: THE INDEX — pixel font default, sane fallback -->
  <alias>
    <family>Perfect DOS VGA 437</family>
    <prefer><family>DejaVu Sans</family></prefer>
  </alias>
  <!-- make the pixel font the default sans/serif/mono everywhere -->
  <match target="pattern"><test name="family"><string>sans-serif</string></test>
    <edit name="family" mode="prepend"><string>Perfect DOS VGA 437</string></edit></match>
  <match target="pattern"><test name="family"><string>monospace</string></test>
    <edit name="family" mode="prepend"><string>Perfect DOS VGA 437</string></edit></match>
</fontconfig>
