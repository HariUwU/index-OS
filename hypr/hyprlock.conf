# ======================================================
#  WILL OF THE CITY :: THE INDEX  —  hyprlock
#  Port of the terminal SDDM theme (achievable subset)
# ======================================================
#  INSTALL
#   1. cp wall.png ~/.config/hypr/wall.png
#   2. install the pixel font so font_family resolves:
#        mkdir -p ~/.local/share/fonts
#        cp PerfectDOSVGA437.ttf ~/.local/share/fonts/
#        fc-cache -f
#        fc-list | grep -i dos     # confirm the family name below
#   3. (optional) drop Logo.png + a face icon in ~/.config/hypr/assets/
#   4. test:  hyprlock
#   5. auto-lock: add to hyprland.conf ->  exec-once = hypridle
# ======================================================

$font       = Perfect DOS VGA 437
$cyan       = rgb(5DADE2)
$cyanBright = rgb(85C5E8)
$cyanDim    = rgb(3A7CA5)
$warn       = rgb(FF6B6B)
$success    = rgb(5DE285)

general {
    hide_cursor          = true
    grace                = 0
    ignore_empty_input   = true     # empty Enter won't count as a fail (matches the shake)
    disable_loading_bar  = true
}

background {
    monitor =
    path    = ~/.config/hypr/wall.png
    color   = rgb(000000)
    blur_passes = 0
}

# ---- CLOCK :: _06:07 AM._  (left cluster, upper) ----
label {
    monitor   =
    text      = cmd[update:1000] echo "_$(date +'%I:%M %p')._"
    color     = $cyanBright
    font_size = 56
    font_family = $font
    position  = -360, 150
    halign    = center
    valign    = center
    shadow_passes = 3
    shadow_size   = 4
    shadow_color  = $cyan
}

# ---- LOGO (left cluster, lower) ----
image {
    monitor  =
    path     = ~/.config/hypr/assets/Logo.png
    size     = 200
    rounding = 0
    border_size = 0
    position = -360, -110
    halign   = center
    valign   = center
}

# ---- PROFILE PICTURE (right cluster) ----
image {
    monitor      =
    path         = ~/.face
    size         = 70
    rounding     = 0
    border_size  = 2
    border_color = $cyan
    position     = 90, 150
    halign       = center
    valign       = center
}

# ---- USERNAME :: _NAME._ (uppercased) ----
label {
    monitor   =
    text      = cmd[update:60000] echo "_$(whoami | tr a-z A-Z)._"
    color     = $cyanBright
    font_size = 24
    font_family = $font
    position  = 250, 150
    halign    = center
    valign    = center
}

# ---- STATUS LINE (static; hyprlock can't stage CHECKING->VERIFYING) ----
label {
    monitor   =
    text      = >_ ENTER CREDENTIALS ._
    color     = $cyanDim
    font_size = 18
    font_family = $font
    position  = 180, 40
    halign    = center
    valign    = center
}

# ---- PASSWORD FIELD ----
#  outer border = cyan normally
#  check_color  = warn while PAM authenticates  (== passwordCheckRunning)
#  fail_color   = warn on wrong password
#  capslock_color = warn  (== _CAPS!._ indicator)
input-field {
    monitor          =
    size             = 340, 50
    outline_thickness = 2
    dots_size        = 0.25
    dots_spacing     = 0.30
    dots_center      = true
    rounding         = 0

    outer_color      = $cyan
    inner_color      = rgb(000000)
    font_color       = $cyanBright
    font_family      = $font

    check_color      = $warn
    fail_color       = $warn
    capslock_color   = $warn

    fade_on_empty    = false
    placeholder_text = <i>_ ENTER PASSWORD ._</i>
    fail_text        = <b>_ ACCESS DENIED ._</b>  ($ATTEMPTS)

    position         = 180, -30
    halign           = center
    valign           = center
    shadow_passes    = 2
    shadow_size      = 3
    shadow_color     = $cyan
}

# ---- bottom-left HUD echo ----
label {
    monitor   =
    text      = > the index is listening_
    color     = $cyanDim
    font_size = 14
    font_family = $font
    position  = 40, 40
    halign    = left
    valign    = bottom
}
