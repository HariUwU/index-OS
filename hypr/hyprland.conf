# ============================================================
#  WILL OF THE CITY :: THE INDEX  —  base Hyprland config
#  A full, USABLE desktop. Use this if you have no working
#  Hyprland config yet. Sources the theme at the bottom.
# ============================================================

# ---- monitor (auto-detect; edit if you need scaling/position) ----
monitor = , preferred, auto, 1

# ---- programs ----
$terminal    = kitty
$menu        = wofi --show drun
$fileManager = thunar

# ---- autostart (daemons live HERE, not in the theme) ----
exec-once = hyprpm reload      # load hyprbars
exec-once = hypridle
exec-once = hyprpaper

# ---- environment ----
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# ---- input ----
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
    }
}

# ---- layout / misc (borders + gaps come from the theme) ----
general { layout = dwindle }
dwindle {
    pseudotile = true
    preserve_split = true
}
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

# ---- keybinds ----
$mod = SUPER

bind = $mod, Return, exec, $terminal
bind = $mod, Q, killactive,
bind = $mod, E, exec, $fileManager
bind = $mod, D, exec, $menu
bind = $mod, V, togglefloating,
bind = $mod, F, fullscreen,
bind = $mod, P, pseudo,
bind = $mod, J, togglesplit,
bind = $mod, L, exec, loginctl lock-session
bind = $mod SHIFT, Q, exit,

# focus
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# workspaces 1-9,0
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# move window to workspace
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# drag windows with the mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# volume / brightness (needs wireplumber + brightnessctl)
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp,   exec, brightnessctl s 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl s 5%-

# ============================================================
#  THE INDEX theme (colours + hyprbars) — keep this last
# ============================================================
source = ~/.config/hypr/will-of-the-city.conf
