# ~/.config/hypr/hypridle.conf
# WILL OF THE CITY :: THE INDEX
# The INDEX lock is the ONLY locker. There is NO idle auto-lock.
general {
    # if anything ever requests a lock (loginctl lock-session, before-sleep),
    # it can ONLY be the INDEX lock — never hyprlock, never noctalia.
    lock_cmd         = pgrep -f lock/lock.qml || quickshell -p ~/.config/quickshell/lock/lock.qml
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd  = hyprctl dispatch dpms on
}

# NO idle-lock listener on purpose — the screen never locks itself.
# (only a manual Super+L runs the INDEX lock.)
# screen-off after 10 min of inactivity is just power saving, NOT a lock:
listener {
    timeout    = 600
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}
