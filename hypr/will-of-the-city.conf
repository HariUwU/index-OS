# ============================================================
#  WILL OF THE CITY :: THE INDEX  —  theme (VISUAL ONLY)
#  Safe to `source` on top of ANY existing Hyprland config.
#  No exec-once / no keybinds here, so it never duplicates
#  daemons or fights your base config. Colours + hyprbars only.
# ============================================================

general {
    gaps_in = 5
    gaps_out = 14
    border_size = 2
    col.active_border = rgba(5DADE2ee) rgba(3A7CA5ee) 45deg
    col.inactive_border = rgba(0A0E14aa)
}

decoration {
    rounding = 0
    blur {
        enabled = true
        size = 6
        passes = 3
    }
    shadow {
        enabled = true
        range = 22
        render_power = 3
        color = rgba(5DADE2aa)
    }
}

# per-window titlebars with [min][max][close] (colored dots)
plugin {
    hyprbars {
        bar_height = 26
        bar_color = rgb(0c1620)
        col.text = rgb(85C5E8)
        bar_text_size = 11
        bar_text_font = Perfect DOS VGA 437
        bar_part_of_window = true
        bar_precedence_over_border = true

        hyprbars-button = rgb(FF6B6B), 13, , hyprctl dispatch killactive
        hyprbars-button = rgb(5DADE2), 13, , hyprctl dispatch fullscreen 1
        hyprbars-button = rgb(3A7CA5), 13, , hyprctl dispatch movetoworkspacesilent special:min
    }
}
